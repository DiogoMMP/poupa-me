<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Categorias</h1>

    <div class="page-actions">
      <button routerLink="/categorias/criar">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6z" fill="currentColor"/>
        </svg>
        <span>Criar Categoria</span>
      </button>
    </div>
  </div>

  <div *ngIf="isLoading$ | async" class="loading-state">A carregar...</div>

  <div *ngIf="!(isLoading$ | async)" class="content-container">
    <ng-container *ngIf="(categorias$ | async) as categorias">
      <div *ngIf="categorias.length === 0" class="empty-state">
        <p>Não existem categorias criadas.</p>
      </div>

      <div *ngIf="categorias.length > 0" class="cards-grid">
        <div *ngFor="let categoria of categorias" class="card card--hover">
          <div class="card-icon-wrapper">
            <div class="card-icon card-icon--circle">{{ categoria.icon }}</div>
          </div>

          <div class="card-content">
            <h3 class="card-title">{{ categoria.nome }}</h3>
          </div>

          <div class="card-actions">
            <button [routerLink]="['/categorias/editar', categoria.id]" class="btn-action">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path
                  d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"
                  fill="currentColor"/>
              </svg>
              <span>Editar</span>
            </button>

            <button (click)="deleteCategoria(categoria.id)" class="btn-delete">
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24">
                <path d="M6 7h12v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7zm3-4h6l1 1H8l1-1z" fill="currentColor"/>
              </svg>
              <span>Eliminar</span>
            </button>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

</div>
