<div class="page-container">
  <div class="form-card">

    <ng-container *ngIf="vm.despesa$ | async as despesa">
      <div class="form-header">
        <h1 class="form-title">
          Registar Fatura de {{ despesa.nome }}
        </h1>
        <p class="form-subtitle">Introduza o valor e a data da despesa.</p>
      </div>
    </ng-container>

    <div *ngIf="vm.isLoading$ | async" class="loading-state">A carregar...</div>

    <form *ngIf="!(vm.isLoading$ | async)" [formGroup]="form" (ngSubmit)="onSubmit()" class="form-content">

      <div class="form-field" formGroupName="valor">
        <label class="form-label">Valor</label>
        <div class="row-controls">
          <input
            type="number"
            id="valor"
            formControlName="valor"
            class="form-input"
            placeholder="Ex: 45.99"
            step="0.01"
            min="0">

          <input
            type="text"
            id="moeda"
            formControlName="moeda"
            class="form-input"
            value="EUR">
        </div>
      </div>

      <div class="form-field">
        <label for="data" class="form-label">Data</label>
        <input
          type="date"
          id="data"
          formControlName="data"
          class="form-input">
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="form.invalid || (vm.isLoading$ | async)">
          <svg width="16" height="16" viewBox="0 0 24 24">
            <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" fill="currentColor"/>
          </svg>
          <span>Gerar Transação</span>
        </button>

        <button type="button" routerLink="/despesas-recorrentes" class="btn-secondary">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
