<div class="page-container">
  <div *ngIf="vm.isLoading$ | async" class="loading-state">A carregar...</div>

  <ng-container *ngIf="!(vm.isLoading$ | async)">
    <ng-container *ngIf="vm.perfil$ | async as perfil">

      <div class="form-card">
        <div class="form-header">
          <div class="profile-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <path d="M17.9691 20C17.81 17.1085 16.9247 15 11.9999 15C7.07521 15 6.18991 17.1085 6.03076 20"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
          </div>
          <h1 class="form-title">{{ perfil.nome }}</h1>
          <p class="form-subtitle">{{ perfil.email }}</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-content">

          <!-- Name -->
          <div class="form-field">
            <label for="name" class="form-label">Nome</label>
            <input
              type="text" id="name" formControlName="name"
              class="form-input" placeholder="O seu nome"/>
          </div>

          <!-- New Password -->
          <div class="form-field">
            <label for="password" class="form-label">
              Nova Password
              <span class="form-label-hint">(deixe em branco para manter a atual)</span>
            </label>
            <input
              type="password" id="password" formControlName="password"
              class="form-input" placeholder="••••••••"/>
          </div>

          <!-- Confirm Password -->
          <div class="form-field">
            <label for="passwordConfirm" class="form-label">Confirme a Password</label>
            <input
              type="password" id="passwordConfirm" formControlName="passwordConfirm"
              class="form-input" placeholder="••••••••"
              [class.input-error]="passwordMismatch"/>
            <span class="form-error" *ngIf="passwordMismatch">As passwords não coincidem</span>
          </div>

          <div class="form-actions">
            <button type="submit" [disabled]="passwordMismatch || (vm.isSaving$ | async)">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" fill="currentColor"/>
              </svg>
              <span>{{ (vm.isSaving$ | async) ? 'A Guardar...' : 'Guardar' }}</span>
            </button>
          </div>

        </form>
      </div>

    </ng-container>
  </ng-container>
</div>
