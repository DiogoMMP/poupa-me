<footer class="app-footer" role="contentinfo">
  <div class="footer-content">
    <nav class="footer-links">
      <div class="login_flags">

        <div *ngIf="user() as u; else showLogin" class="user-info">
          <a href="#" class="login-link user" role="link" (click)="goToProfile($event)">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <path d="M17.9691 20C17.81 17.1085 16.9247 15 11.9999 15C7.07521 15 6.18991 17.1085 6.03076 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
            <span class="user-name">{{ u.name }}</span>
          </a>

          <a href="" class="login-link logout-link" role="button"
             (click)="logout(); $event.preventDefault()"> Sair </a>
        </div>

        <ng-template #showLogin>
          <a routerLink="/login" class="login-link"> Entrar </a>
        </ng-template>

      </div>

    </nav>

    <small class="copyright">
      © {{ year }} Diogo Pereira. Todos os direitos reservados.
    </small>
  </div>
</footer>
